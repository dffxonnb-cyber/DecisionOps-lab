name: Verify DecisionOps Lab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate synthetic dataset
        run: python scripts/generate_dataset.py --scenario strong_positive

      - name: Run SQL pipeline
        run: python scripts/run_pipeline.py

      - name: Run data quality checks
        run: python scripts/run_quality_checks.py

      - name: Run experiment analysis
        run: python scripts/run_experiment_analysis.py

      - name: Generate decision memo
        run: python scripts/generate_decision_memo.py

      - name: Generate reviewer report
        run: python scripts/generate_review_report.py

      - name: Run scenario matrix
        run: python scripts/run_scenario_matrix.py

      - name: Run tests
        run: pytest

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: decisionops-v1-reports
          path: |
            reports/quality_report.json
            reports/experiment_result.json
            reports/decision_memo.md
            reports/review_report.html
            reports/scenario_matrix.json
            reports/scenario_matrix.md
