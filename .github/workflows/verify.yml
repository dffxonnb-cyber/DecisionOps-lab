name: Verify DecisionOps Lab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run full verification
        run: python scripts/run_full_verification.py

      - name: Check tracked report freshness
        run: python scripts/check_report_freshness.py

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: decisionops-reports
          path: |
            reports/quality_report.json
            reports/experiment_result.json
            reports/decision_memo.md
            reports/review_report.html
            reports/scenario_matrix.json
            reports/scenario_matrix.md
