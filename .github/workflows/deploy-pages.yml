name: Publish Reviewer Report

on:
  push:
    branches:
      - main
    paths:
      - reports/review_report.html
      - reports/decision_memo.md
      - reports/scenario_matrix.md
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare public report
        run: |
          mkdir -p public
          cp reports/review_report.html public/index.html
          cp reports/review_report.html public/review_report.html
          cp reports/decision_memo.md public/decision_memo.md
          cp reports/scenario_matrix.md public/scenario_matrix.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
